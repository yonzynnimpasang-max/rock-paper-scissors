<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home screen</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Tamil&display=swap" rel="stylesheet">
    </head>
<body>
    <div id="waves">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="#0099ff" fill-opacity="1" d="M0,0L48,0C96,0,192,0,288,32C384,64,480,128,576,160C672,192,768,192,864,197.3C960,203,1056,213,1152,181.3C1248,149,1344,75,1392,37.3L1440,0L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>
    </div>
    <main>
    <div id="title"><h1>ROCK PAPER AND SCISSORS</h1></div>
    <div id="settings_container">
        <button id="closeSettings">x</button>
        <div class="setting-row">
        <h1>SETTINGS</h1>
    </div>
    <div class="setting-row">
    <span>Sound</span>

    <label class="switch">
        <input type="checkbox" id="togglesound">
        <span class="slider"></span>
    </label>
</div>

<div class="setting-row">
    <span>Vibration</span>

    <label class="switch">
        <input type="checkbox" id="togglevibration">
        <span class="slider"></span>
    </label>
</div>
    <div class="setting-row">
    <span>BG Music</span>

    <label class="switch">
        <input type="checkbox" id="backgroundmusic">
        <span class="slider"></span>
    </label>
</div>
</div>
    <div class="goto">
        <button id="play">Play</button>
        <button id="how_to_play">How to play?</button>
        <div id="htp">
            <p id="popup"></p>
        <button id="closehowtoplay">x</button>
    </div>
        <button id="setting">Settings</button>
    </div>
</main>
    <div id="wavy">
         <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="#0077c9" fill-opacity="1" d="M0,288L48,282.7C96,277,192,267,288,224C384,181,480,107,576,90.7C672,75,768,117,864,133.3C960,149,1056,139,1152,133.3C1248,128,1344,128,1392,128L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>
    </div>
<script src="script.js"></script>
</body>
</html>
